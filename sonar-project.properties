# SonarCloud configuration for fdb-tracker
# Replace the projectKey and organization values with the ones shown on the
# SonarCloud project page after you import this repo (Step 3 in the setup guide).

sonar.projectKey=REPLACE_ME_PROJECT_KEY
sonar.organization=REPLACE_ME_ORGANIZATION

sonar.sources=app,components,hooks,lib
sonar.tests=__tests__
sonar.test.inclusions=__tests__/**/*

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=**/*.d.ts,**/node_modules/**,**/.next/**,lib/supabase/database.types.ts,phase4-dumps/**,scripts/**,public/**,supabase/migrations/**

sonar.sourceEncoding=UTF-8
